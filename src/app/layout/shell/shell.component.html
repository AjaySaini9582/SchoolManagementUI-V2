<app-topbar (menuToggle)="toggleSidenav()" class="no-print" />

<mat-sidenav-container class="shell-container">
  <mat-sidenav [mode]="sidenavMode()" [opened]="sidenavOpened()" class="shell-sidenav no-print">
    <app-sidebar />
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
