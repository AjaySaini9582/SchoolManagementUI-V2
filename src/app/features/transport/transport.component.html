<div class="transport-page">
  <h1>Transport</h1>

  <mat-tab-group animationDuration="0ms">
    <mat-tab label="Assign Transport">
      <ng-template matTabContent>
        <app-assign-transport />
      </ng-template>
    </mat-tab>

    <mat-tab label="Roster">
      <ng-template matTabContent>
        <app-transport-roster />
      </ng-template>
    </mat-tab>

    <mat-tab label="Route Summary">
      <ng-template matTabContent>
        <app-route-summary />
      </ng-template>
    </mat-tab>
  </mat-tab-group>
</div>
