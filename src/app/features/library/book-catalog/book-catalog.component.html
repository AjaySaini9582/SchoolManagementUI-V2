<div class="book-catalog-page">
  <div class="section-header">
    <button mat-flat-button color="primary" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Add Book
    </button>
  </div>

  @if (showForm()) {
    <form [formGroup]="form" (ngSubmit)="save()" class="inline-form">
      <mat-form-field appearance="outline">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" />
      </mat-form-field>
      <app-field-error [control]="form.controls.title" />

      <mat-form-field appearance="outline">
        <mat-label>Author</mat-label>
        <input matInput formControlName="author" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>ISBN</mat-label>
        <input matInput formControlName="isbn" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Category</mat-label>
        <input matInput formControlName="category" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Publisher</mat-label>
        <input matInput formControlName="publisher" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Total Copies</mat-label>
        <input matInput type="number" min="1" formControlName="totalCopies" />
      </mat-form-field>
      <app-field-error [control]="form.controls.totalCopies" />

      <div class="form-actions">
        <button mat-button type="button" (click)="cancel()">Cancel</button>
        <button mat-flat-button color="primary" type="submit" [disabled]="saving()">Save</button>
      </div>
    </form>
  }

  @if (loading()) {
    <app-skeleton height="3rem" />
  } @else if (books().length === 0) {
    <app-empty-state icon="menu_book" title="No books yet" description="Add a book to start building the catalog." />
  } @else {
    <div class="table-wrapper">
      <table mat-table [dataSource]="books()" class="book-table">
        <ng-container matColumnDef="title">
          <th mat-header-cell *matHeaderCellDef>Title</th>
          <td mat-cell *matCellDef="let row">{{ row.title }}</td>
        </ng-container>
        <ng-container matColumnDef="author">
          <th mat-header-cell *matHeaderCellDef>Author</th>
          <td mat-cell *matCellDef="let row">{{ row.author || '—' }}</td>
        </ng-container>
        <ng-container matColumnDef="category">
          <th mat-header-cell *matHeaderCellDef>Category</th>
          <td mat-cell *matCellDef="let row">{{ row.category || '—' }}</td>
        </ng-container>
        <ng-container matColumnDef="copies">
          <th mat-header-cell *matHeaderCellDef>Available / Total</th>
          <td mat-cell *matCellDef="let row">{{ row.availableCopies }} / {{ row.totalCopies }}</td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row" class="actions-cell">
            <button mat-icon-button title="Edit" (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button title="Remove" (click)="confirmDeactivate(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>
  }
</div>
