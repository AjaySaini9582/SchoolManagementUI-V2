<h2 mat-dialog-title>Confirm {{ data.applicantName }} as a Student</h2>

<mat-dialog-content>
  @if (loading()) {
    <mat-spinner diameter="28" />
  } @else {
    <form [formGroup]="form" class="field-grid">
      <mat-form-field appearance="outline">
        <mat-label>Class</mat-label>
        <mat-select formControlName="classId">
          @for (cls of classSections(); track cls.id) {
            <mat-option [value]="cls.id">{{ cls.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Section</mat-label>
        <mat-select formControlName="classSectionId">
          @for (section of sectionsForSelectedClass(); track section.id) {
            <mat-option [value]="section.id">{{ section.name }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </form>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button color="primary" [disabled]="saving()" (click)="confirm()">
    @if (saving()) {
      <mat-spinner diameter="20" />
    } @else {
      Confirm
    }
  </button>
</mat-dialog-actions>
