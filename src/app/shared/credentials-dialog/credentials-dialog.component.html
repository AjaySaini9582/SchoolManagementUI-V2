<h2 mat-dialog-title>{{ data.title ?? 'Login credentials' }}</h2>
<mat-dialog-content>
  <p>{{ data.message ?? 'Save these now — the password will not be shown again.' }}</p>

  @if (data.username) {
    <div class="credential-row">
      <span class="credential-label">Username</span>
      <span class="credential-value">{{ data.username }}</span>
      <button mat-icon-button title="Copy username" (click)="copy(data.username)">
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
  }

  @if (data.password) {
    <div class="credential-row">
      <span class="credential-label">Password</span>
      <span class="credential-value">{{ data.password }}</span>
      <button mat-icon-button title="Copy password" (click)="copy(data.password)">
        <mat-icon>content_copy</mat-icon>
      </button>
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-flat-button color="primary" mat-dialog-close>Done</button>
</mat-dialog-actions>
